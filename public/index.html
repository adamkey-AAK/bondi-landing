<html lang="en">

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  
<script>
(function () {
  function updateLogoFog() {
    var opacity = Math.min(window.scrollY / 90, 1);
    document.documentElement.style.setProperty('--logo-fog-opacity', opacity.toFixed(3));
  }
  updateLogoFog();
  window.addEventListener('scroll', updateLogoFog, { passive: true });
})();
</script>


<script>
window.addEventListener('scroll', () => {
  const opacity = Math.min(window.scrollY / 80, 1) * 0.9;
  document.documentElement.style.setProperty('--fogOpacity', opacity);
}, { passive: true });
</script>

</body>
</html>
